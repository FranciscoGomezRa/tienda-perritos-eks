apiVersion: v1
kind: Service
metadata:
  name: tienda-frontend
  namespace: tienda
  # Sin anotaciones de AWS Load Balancer Controller: en AWS Academy Learner Lab
  # ese controller no está instalado. Con `type: LoadBalancer` a secas, EKS
  # aprovisiona un Classic Load Balancer (ELB) público automáticamente, que es
  # suficiente para exponer el frontend con una URL pública (IE2).
spec:
  type: LoadBalancer
  selector:
    app: tienda-frontend
  ports:
    - port: 80
      targetPort: 80
