# PLANTILLA DE REFERENCIA — NO contiene credenciales reales y NO se aplica directamente.
#
# El Secret real 'mysql-secret' se crea de dos formas:
#   1) CI/CD (recomendado): el workflow lo genera desde GitHub Secrets, ver
#      .github/workflows/deploy-eks.yml  (paso "Crear/actualizar Secret de MySQL").
#   2) Manual: a partir de tu archivo .env (que está en .gitignore):
#        kubectl create secret generic mysql-secret \
#          --from-literal=MYSQL_ROOT_PASSWORD="TU_PASSWORD" \
#          -n tienda --dry-run=client -o yaml | kubectl apply -f -
#
# Así la contraseña NUNCA queda versionada en el repositorio (requisito IE5).
#
# Si aun así quisieras un manifiesto, el valor va en base64 (ejemplo de formato):
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: tienda
type: Opaque
data:
  MYSQL_ROOT_PASSWORD: <BASE64_DE_TU_PASSWORD>   # echo -n 'TU_PASSWORD' | base64
